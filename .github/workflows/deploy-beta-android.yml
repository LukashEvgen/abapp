name: Deploy Beta — Android (Firebase App Distribution)

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - '.github/workflows/deploy-beta-android.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build APK & Distribute to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute to Firebase App Distribution
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" \
            --groups "qa-team,beta-testers" \
            --release-notes "Beta build from ${{ github.ref_name }} @ ${{ github.sha }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
