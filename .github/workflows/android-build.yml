name: Android Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'android/**'
      - 'src/**'
      - 'package.json'
      - 'android-build.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      distribute:
        description: 'Distribute via Firebase App Distribution'
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_COMPILE_SDK: 34
      ANDROID_BUILD_TOOLS: 34.0.0
      ANDROID_COMMAND_LINE_TOOLS: 11076708
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Decode release keystore
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build APK (debug)
        if: github.ref != 'refs/heads/main'
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Build AAB (release)
        if: github.ref == 'refs/heads/main'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload debug APK artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release AAB artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload APK mapping
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

  firebase-distribution:
    name: Firebase App Distribution
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.distribute)
    steps:
      - uses: actions/checkout@v4

      - name: Download debug APK
        if: github.ref != 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: apk/

      - name: Download release AAB
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: aab/

      - name: Install Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Distribute debug APK to QA
        if: github.ref != 'refs/heads/main'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute apk/app-debug.apk \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" \
            --groups "qa-team" \
            --release-notes "Build from ${{ github.ref }} — ${{ github.sha }}" \
            --project lextrack-staging

      - name: Distribute release AAB to Beta
        if: github.ref == 'refs/heads/main'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute aab/app-release.aab \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" \
            --groups "beta-testers,qa-team" \
            --release-notes "Production beta build ${{ github.run_number }} — ${{ github.sha }}" \
            --project lextrack-prod

  android-e2e-tests:
    name: Android E2E Tests
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 34]
        target: [default]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            $HOME/.maestro/bin/maestro test e2e/android/ --format junit

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-android-api${{ matrix.api-level }}
          path: |
            ~/.maestro/tests/
            e2e/reports/
          retention-days: 7