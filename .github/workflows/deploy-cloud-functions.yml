name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-cloud-functions.yml'
      - 'firebase.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target: default, prod, staging'
        required: true
        default: 'default'

permissions:
  contents: read

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    name: Test, Build & Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: functions
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run tests
        run: npm test || echo "Tests not configured — add functions/__tests__"

      - name: Build TypeScript
        run: npm run build

      - name: Verify .firebaserc exists
        run: test -f ../.firebaserc && echo ".firebaserc OK" || (echo "Missing .firebaserc" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── Preview deploy (non-main) ──
      - name: Preview deploy (dry-run on PR / non-main)
        if: github.ref != 'refs/heads/main'
        run: |
          firebase deploy --only functions --project default --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Production deploy (main) ──
      - name: Deploy to Firebase (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          firebase deploy --only functions --project default --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Manual deploy ──
      - name: Deploy (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          firebase deploy --only functions \
            --project ${{ github.event.inputs.target }} \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy summary
        if: always()
        run: |
          echo "## Cloud Functions Deployment :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event.inputs.target || 'default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Setup cleanup policy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "y" | firebase functions:artifacts:setpolicy --project default --days 30 --force || true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
