name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-cloud-functions.yml'
      - 'firebase.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target: default, prod, staging'
        required: true
        default: 'default'

jobs:
  build-and-deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    env:
      # GOOGLE_APPLICATION_CREDENTIALS or FIREBASE_TOKEN must be set in repository secrets
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify .firebaserc exists
        run: test -f ../.firebaserc && echo ".firebaserc OK" || (echo "Missing .firebaserc" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Dry-run deploy (non-main branches or manual)
        if: github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          firebase deploy --only functions --project ${{ github.event.inputs.target || 'default' }} --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          firebase deploy --only functions --project default --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy info
        if: always()
        run: echo "Deployment finished. Check Firebase Console → Functions for status."

      - name: Setup cleanup policy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "y" | firebase functions:artifacts:setpolicy --project default --days 30 --force || true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
