name: Deploy Firebase Rules

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/workflows/deploy-firebase-rules.yml'
      - 'firebase.json'
      - 'tests/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'tests/jest.config.js'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target: default, staging, prod'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - staging
          - prod

permissions:
  contents: read

concurrency:
  group: deploy-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install root dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run rules unit tests
        run: |
          firebase emulators:exec --only firestore,storage \
            "npm run test:rules" \
            --project default
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy:
    name: Deploy Rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify .firebaserc exists
        run: test -f .firebaserc && echo ".firebaserc OK" || (echo "Missing .firebaserc" && exit 1)

      - name: Validate rules (dry-run)
        run: |
          firebase deploy --only firestore:rules,storage --project default --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore rules
        run: |
          firebase deploy --only firestore:rules \
            --project ${{ github.event.inputs.target || 'default' }} \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: |
          firebase deploy --only storage \
            --project ${{ github.event.inputs.target || 'default' }} \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Write summary
        if: always()
        run: |
          echo "## Rules Deployment Finished :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event.inputs.target || 'default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
