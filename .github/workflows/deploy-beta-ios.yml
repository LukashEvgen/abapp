name: Deploy Beta — iOS (TestFlight)

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'ios/**'
      - 'package.json'
      - '.github/workflows/deploy-beta-ios.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build IPA & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Decode provisioning profile & certificate
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/lextrack_beta.mobileprovision
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > ios/build_certificate.p12

      - name: Import certificate to keychain
        run: |
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security unlock-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import ios/build_certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security list-keychains -s build.keychain

      - name: Archive
        run: |
          cd ios
          xcodebuild \
            -workspace LexTrack.xcworkspace \
            -scheme LexTrack \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/LexTrack.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="lextrack_beta" \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA for App Store
        run: |
          cd ios
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.lextrack</key>
              <string>lextrack_beta</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/LexTrack.xcarchive \
            -exportPath build/Output \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight via App Store Connect
        run: |
          cd ios
          xcrun altool --upload-app \
            --type ios \
            --file build/Output/LexTrack.ipa \
            --apiKey "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-ios-ipa
          path: ios/build/Output/LexTrack.ipa
          retention-days: 14
