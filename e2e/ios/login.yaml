appId: com.lextrack
---
- launchApp:
    clearState: true

- assertVisible: "LexTrack"

- tapOn: ".*Email.*"
- inputText: "test@example.com"

- tapOn: ".*Password.*"
- inputText: "TestPass123!"

- tapOn: ".*Sign In.*"

- waitForAnimationToEnd:
    timeout: 10000

- assertVisible: "Dashboard|Головна|Cases|Справи"
