<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Stat cards</title><style>
body{margin:0;padding:24px;display:flex;gap:12px;background:var(--surface-base);}
.card{flex:1;background:var(--surface-raised);border:1px solid var(--border-subtle);border-radius:10px;padding:16px;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow-1);}
.icon{font-size:24px;margin-bottom:4px;}
.value{font-size:24px;font-weight:700;color:var(--text-primary);}
.label{font-size:12px;color:var(--text-secondary);margin-top:4px;}
</style></head><body>
<div class="card"><div class="icon">⚖</div><div class="value">4</div><div class="label">Справи</div></div>
<div class="card"><div class="icon">🔍</div><div class="value">2</div><div class="label">Перевірки</div></div>
<div class="card"><div class="icon">💰</div><div class="value">1</div><div class="label">Рахунки</div></div>
</body></html>
