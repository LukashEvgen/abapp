<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Semantic</title><style>
body{margin:0;padding:24px;}
.row{display:flex;gap:12px;}
.sw{flex:1;border-radius:10px;border:1px solid var(--border-subtle);overflow:hidden;background:var(--surface-raised);box-shadow:var(--shadow-1);}
.sw .top{height:64px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.sw .meta{padding:10px 12px;}
.sw .name{font-size:12px;font-weight:600;color:var(--text-primary);}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px;}
</style></head><body>
<div class="row">
<div class="sw"><div class="top" style="background:#4A9B6E">success</div><div class="meta"><div class="name">Success</div><div class="hex">#4A9B6E</div></div></div>
<div class="sw"><div class="top" style="background:#C28B3C">warning</div><div class="meta"><div class="name">Warning</div><div class="hex">#C28B3C</div></div></div>
<div class="sw"><div class="top" style="background:#B84545">danger</div><div class="meta"><div class="name">Danger</div><div class="hex">#B84545</div></div></div>
<div class="sw"><div class="top" style="background:#3D7AA8">info</div><div class="meta"><div class="name">Info</div><div class="hex">#3D7AA8</div></div></div>
</div></body></html>
