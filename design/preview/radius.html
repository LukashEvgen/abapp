<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Radius</title><style>
body{margin:0;padding:24px;display:flex;gap:14px;}
.box{width:80px;height:80px;background:var(--brand-primary-muted);border:1px solid var(--brand-primary);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:10px;color:var(--brand-primary-dark);font-weight:600;}
</style></head><body>
<div class="box" style="border-radius:0">none · 0</div>
<div class="box" style="border-radius:6px">sm · 6</div>
<div class="box" style="border-radius:10px">md · 10</div>
<div class="box" style="border-radius:16px">lg · 16</div>
<div class="box" style="border-radius:24px">xl · 24</div>
<div class="box" style="border-radius:9999px">full</div>
</body></html>
