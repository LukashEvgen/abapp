<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Neutral</title><style>
body{margin:0;padding:24px;}
.scale{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.sw{border-radius:8px;border:1px solid var(--border-subtle);overflow:hidden;}
.sw .top{height:48px;}
.sw .meta{padding:6px 8px;background:var(--surface-raised);}
.sw .name{font-size:10px;font-weight:600;color:var(--text-primary);}
.sw .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);}
</style></head><body>
<div class="scale">
<div class="sw"><div class="top" style="background:#FFFFFF"></div><div class="meta"><div class="name">0</div><div class="hex">#FFFFFF</div></div></div><div class="sw"><div class="top" style="background:#F8F9FA"></div><div class="meta"><div class="name">50</div><div class="hex">#F8F9FA</div></div></div><div class="sw"><div class="top" style="background:#F1F3F4"></div><div class="meta"><div class="name">100</div><div class="hex">#F1F3F4</div></div></div><div class="sw"><div class="top" style="background:#E4E7E9"></div><div class="meta"><div class="name">200</div><div class="hex">#E4E7E9</div></div></div><div class="sw"><div class="top" style="background:#C9CDD0"></div><div class="meta"><div class="name">300</div><div class="hex">#C9CDD0</div></div></div><div class="sw"><div class="top" style="background:#9DA1A4"></div><div class="meta"><div class="name">400</div><div class="hex">#9DA1A4</div></div></div><div class="sw"><div class="top" style="background:#7C8084"></div><div class="meta"><div class="name">500</div><div class="hex">#7C8084</div></div></div><div class="sw"><div class="top" style="background:#5C6164"></div><div class="meta"><div class="name">600</div><div class="hex">#5C6164</div></div></div><div class="sw"><div class="top" style="background:#424649"></div><div class="meta"><div class="name">700</div><div class="hex">#424649</div></div></div><div class="sw"><div class="top" style="background:#2C2F31"></div><div class="meta"><div class="name">800</div><div class="hex">#2C2F31</div></div></div><div class="sw"><div class="top" style="background:#1B1D1F"></div><div class="meta"><div class="name">900</div><div class="hex">#1B1D1F</div></div></div><div class="sw"><div class="top" style="background:#0F1011"></div><div class="meta"><div class="name">1000</div><div class="hex">#0F1011</div></div></div>
</div></body></html>
