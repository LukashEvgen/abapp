<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Chat</title><style>
body{margin:0;padding:24px;background:var(--surface-base);}
.row{display:flex;margin-bottom:8px;}
.row.mine{justify-content:flex-end;}
.b{max-width:70%;padding:10px 14px;font-size:14px;line-height:1.45;font-family:var(--font-sans);}
.theirs{background:#fff;color:var(--text-primary);border:1px solid var(--border-subtle);border-radius:14px 14px 14px 4px;box-shadow:var(--shadow-1);}
.mine .b{background:var(--brand-primary);color:#fff;font-weight:500;border-radius:14px 14px 4px 14px;}
.time{font-size:11px;color:var(--text-tertiary);text-align:center;margin:8px 0;}
</style></head><body>
<div class="time">Сьогодні, 14:32</div>
<div class="row"><div class="b theirs">Добрий день! Підготував відзив для суду.</div></div>
<div class="row mine"><div class="b">Дякую! Коли наступне засідання?</div></div>
<div class="row"><div class="b theirs">12 травня о 10:00, буду присутній.</div></div>
</body></html>
