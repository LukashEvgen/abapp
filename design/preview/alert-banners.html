<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Alerts</title><style>
body{margin:0;padding:24px;display:flex;flex-direction:column;gap:10px;}
.alert{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:10px;border-left:3px solid;font-family:var(--font-sans);font-size:14px;font-weight:500;}
.arrow{font-size:18px;font-weight:700;}
</style></head><body>
<div class="alert" style="background:rgba(184,69,69,0.10);color:#8A3232;border-color:#B84545"><span><strong style="font-weight:700">Критично:</strong> &nbsp;Перевірка ДПС — потрібна реакція до 15.05</span><span class="arrow">→</span></div>
<div class="alert" style="background:rgba(194,139,60,0.10);color:#8C622A;border-color:#C28B3C"><span><strong style="font-weight:700">Увага:</strong> &nbsp;Неоплачено рахунків на ₴24 500</span><span class="arrow">→</span></div>
<div class="alert" style="background:rgba(42,143,168,0.12);color:#1F6F84;border-color:#2A8FA8"><span><strong style="font-weight:700">Нагадування:</strong> &nbsp;Засідання у справі 12 травня о 10:00</span><span class="arrow">→</span></div>
<div class="alert" style="background:rgba(74,155,110,0.10);color:#366E4F;border-color:#4A9B6E"><span><strong style="font-weight:700">Готово:</strong> &nbsp;Відзив подано та зареєстровано судом</span><span class="arrow">→</span></div>
<div class="alert" style="background:rgba(61,122,168,0.10);color:#2A567A;border-color:#3D7AA8"><span><strong style="font-weight:700">Інфо:</strong> &nbsp;Оновлено реєстр судових рішень</span><span class="arrow">→</span></div>
</body></html>
