<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Surfaces</title><style>
body{margin:0;padding:24px;display:flex;flex-direction:column;gap:14px;}
.row{display:flex;gap:12px;align-items:center;}
.box{width:140px;height:64px;border-radius:10px;border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);}
.label{font-size:12px;color:var(--text-primary);font-weight:600;}
</style></head><body>
<div class="row"><div class="box" style="background:var(--surface-bg)">#FFFFFF</div><div class="label">surface-bg · сторінка</div></div>
<div class="row"><div class="box" style="background:var(--surface-base)">#F8F9FA</div><div class="label">surface-base · поля вводу</div></div>
<div class="row"><div class="box" style="background:var(--surface-sunken)">#F1F3F4</div><div class="label">surface-sunken · hover, alt</div></div>
<div class="row"><div class="box" style="background:var(--surface-raised);box-shadow:var(--shadow-1)">#FFFFFF + shadow</div><div class="label">surface-raised · картки</div></div>
<div class="row"><div class="box" style="background:var(--surface-inverse);color:#fff">#1B1D1F</div><div class="label">surface-inverse · темні CTA</div></div>
</body></html>
