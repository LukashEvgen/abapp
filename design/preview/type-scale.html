<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Type scale</title><style>
body{margin:0;padding:24px;}
.row{display:flex;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--border-subtle);gap:16px;}
.tok{width:90px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);flex-shrink:0;}
.spec{flex:1;color:var(--text-primary);}
</style></head><body>
<div class="row"><div class="tok">3xl · 34</div><div class="spec" style="font-size:34px;font-weight:800;letter-spacing:-.3px;line-height:1.2">LexTrack</div></div>
<div class="row"><div class="tok">2xl · 28</div><div class="spec" style="font-size:28px;font-weight:700;letter-spacing:.5px;line-height:1.2">Привіт, Олексій</div></div>
<div class="row"><div class="tok">xl · 22</div><div class="spec" style="font-size:22px;font-weight:600;letter-spacing:.5px;line-height:1.3">Захист прав на ТМ</div></div>
<div class="row"><div class="tok">lg · 18</div><div class="spec" style="font-size:18px;font-weight:600;line-height:1.5">Засідання 12 травня</div></div>
<div class="row"><div class="tok">md · 16</div><div class="spec" style="font-size:16px;font-weight:400;line-height:1.5">Підготувати позов до засідання</div></div>
<div class="row"><div class="tok">base · 14</div><div class="spec" style="font-size:14px;font-weight:400;line-height:1.5">Господарський суд міста Києва</div></div>
<div class="row"><div class="tok">sm · 12</div><div class="spec" style="font-size:12px;color:var(--text-secondary)">Категорія: Інтелектуальна власність</div></div>
<div class="row"><div class="tok">xs · 11</div><div class="spec" style="font-size:11px;font-weight:600;color:var(--brand-primary);text-transform:uppercase;letter-spacing:1.2px">Активні справи</div></div>
</body></html>
