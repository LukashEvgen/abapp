<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LexTrack — Mobile App UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin:0; min-height:100vh; background:#F1F3F4; display:flex; align-items:flex-start; justify-content:center; padding:80px 20px 40px; gap:40px; flex-wrap:wrap; }
  .phone-wrap { display:flex; flex-direction:column; gap:14px; align-items:center; }
  .label { font-family:'Inter',sans-serif; font-size:11px; font-weight:600; color:#2A8FA8; text-transform:uppercase; letter-spacing:1.2px; }
  .role-toggle { display:flex; gap:6px; padding:4px; background:#FFFFFF; border:1px solid #E4E7E9; border-radius:10px; position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:100; box-shadow:0 2px 6px rgba(15,16,17,0.06); }
  .role-toggle button { background:transparent; border:none; color:#5C6164; padding:8px 16px; font-size:12px; font-weight:600; border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif; }
  .role-toggle button.active { background:#2A8FA8; color:#FFFFFF; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Phone({ children, label, platform = 'ios' }) {
  const Device = platform === 'android' ? AndroidDevice : IOSDevice;
  return (
    <div className="phone-wrap" data-screen-label={label}>
      <Device dark={false}>
        <div style={{ width: '100%', height: '100%', background: '#FFFFFF', display: 'flex', flexDirection: 'column' }}>
          {children}
        </div>
      </Device>
      <div className="label">{label}</div>
    </div>
  );
}

function ClientApp() {
  const [screen, setScreen] = useState('login');
  const [tab, setTab] = useState('home');

  if (screen === 'login') {
    return <LoginScreen onLogin={() => setScreen('app')} />;
  }

  const screenMap = {
    home: <ClientDashboard onNav={(k) => {
      if (k === 'cases') { setTab('cases'); }
      else if (k === 'chat') { setTab('chat'); }
      else if (k === 'documents') { setScreen('documents'); }
      else if (k === 'invoices') { setScreen('invoices'); }
      else if (k === 'caseDetail') { setScreen('caseDetail'); }
      else { setScreen(k); }
    }} />,
    cases: <MyCases onNav={(k) => k === 'caseDetail' && setScreen('caseDetail')} />,
    chat: <ChatScreen onBack={() => setTab('home')} />,
    profile: <div style={{ padding:16, color:'#1B1D1F', fontFamily:'Inter,sans-serif' }}>
      <div style={{ fontSize:28, fontWeight:700, marginBottom:16 }}>Профіль</div>
      <LexListRow avatar={<LexAvatar name="Олексій Коваленко" size={56} />} title="Олексій Коваленко" subtitle="+380 67 904 09 72" />
      <div style={{ height:8 }} />
      <LexButton variant="ghost" onClick={() => { setScreen('login'); setTab('home'); }}>Вийти</LexButton>
    </div>,
  };

  if (screen === 'caseDetail') {
    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
        <div style={{ flex:1, overflowY:'auto' }}><CaseDetail onBack={() => setScreen('app')} /></div>
        <LexBottomTabs active={tab} onChange={(t) => { setTab(t); setScreen('app'); }} tabs={[
          { key:'home', icon:'🏠', label:'Головна' },
          { key:'cases', icon:'⚖', label:'Справи' },
          { key:'chat', icon:'💬', label:'Чат' },
          { key:'profile', icon:'👤', label:'Профіль' },
        ]} />
      </div>
    );
  }

  if (screen === 'documents') {
    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
        <div style={{ flex:1, overflowY:'auto' }}><MyDocuments /></div>
        <LexBottomTabs active={tab} onChange={(t) => { setTab(t); setScreen('app'); }} tabs={[
          { key:'home', icon:'🏠', label:'Головна' },
          { key:'cases', icon:'⚖', label:'Справи' },
          { key:'chat', icon:'💬', label:'Чат' },
          { key:'profile', icon:'👤', label:'Профіль' },
        ]} />
      </div>
    );
  }

  if (screen === 'invoices') {
    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
        <div style={{ flex:1, overflowY:'auto' }}><MyInvoices /></div>
        <LexBottomTabs active={tab} onChange={(t) => { setTab(t); setScreen('app'); }} tabs={[
          { key:'home', icon:'🏠', label:'Головна' },
          { key:'cases', icon:'⚖', label:'Справи' },
          { key:'chat', icon:'💬', label:'Чат' },
          { key:'profile', icon:'👤', label:'Профіль' },
        ]} />
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ flex:1, overflowY:'auto' }}>{screenMap[tab]}</div>
      <LexBottomTabs active={tab} onChange={setTab} tabs={[
        { key:'home', icon:'🏠', label:'Головна' },
        { key:'cases', icon:'⚖', label:'Справи' },
        { key:'chat', icon:'💬', label:'Чат' },
        { key:'profile', icon:'👤', label:'Профіль' },
      ]} />
    </div>
  );
}

function AdminApp() {
  const [tab, setTab] = useState('home');
  const screenMap = {
    home: <AdminDashboard onNav={(k) => k === 'chat' ? setTab('chat') : k === 'clients' ? setTab('clients') : null} />,
    clients: <ClientsList />,
    chat: <ChatScreen onBack={() => setTab('home')} />,
  };
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ flex:1, overflowY:'auto' }}>{screenMap[tab]}</div>
      <LexBottomTabs active={tab} onChange={setTab} tabs={[
        { key:'home', icon:'📊', label:'Панель' },
        { key:'clients', icon:'👥', label:'Клієнти' },
        { key:'chat', icon:'💬', label:'Чати' },
      ]} />
    </div>
  );
}

function App() {
  const [role, setRole] = useState('client');
  return (
    <>
      <div className="role-toggle">
        <button className={role === 'client' ? 'active' : ''} onClick={() => setRole('client')}>Клієнт</button>
        <button className={role === 'admin' ? 'active' : ''} onClick={() => setRole('admin')}>Адміністратор</button>
      </div>
      {role === 'client' ? (
        <>
          <Phone label="01 Client — iOS" platform="ios"><ClientApp /></Phone>
          <Phone label="02 Client — Android" platform="android"><ClientApp /></Phone>
        </>
      ) : (
        <>
          <Phone label="03 Admin — iOS" platform="ios"><AdminApp /></Phone>
          <Phone label="04 Admin — Android" platform="android"><AdminApp /></Phone>
        </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
