<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Avatars</title><style>
body{margin:0;padding:24px;display:flex;gap:14px;align-items:center;}
.av{background:var(--brand-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-sans);}
.av.s{width:28px;height:28px;border-radius:14px;font-size:11px;}
.av.m{width:40px;height:40px;border-radius:20px;font-size:15px;}
.av.l{width:56px;height:56px;border-radius:28px;font-size:21px;}
.av.xl{width:80px;height:80px;border-radius:40px;font-size:30px;}
.av.alt{background:var(--brand-secondary);}
</style></head><body>
<div class="av s">ОК</div>
<div class="av m">ОК</div>
<div class="av l">ОК</div>
<div class="av xl">ОК</div>
<div class="av l alt">МШ</div>
</body></html>
