<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Brand</title><style>
body{margin:0;padding:24px;}
.row{display:flex;gap:12px;flex-wrap:wrap;}
.sw{flex:1;min-width:140px;border-radius:10px;border:1px solid var(--border-subtle);overflow:hidden;background:var(--surface-raised);box-shadow:var(--shadow-1);}
.sw .top{height:72px;}
.sw .meta{padding:10px 12px;}
.sw .name{font-size:12px;font-weight:600;color:var(--text-primary);}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px;}
.section{font-size:11px;font-weight:600;color:var(--brand-primary);text-transform:uppercase;letter-spacing:1.2px;margin:0 0 10px;}
.group{margin-bottom:18px;}
</style></head><body>
<div class="group">
<div class="section">Primary · Pantone 7459 C</div>
<div class="row">
<div class="sw"><div class="top" style="background:#2A8FA8"></div><div class="meta"><div class="name">Primary</div><div class="hex">#2A8FA8</div></div></div>
<div class="sw"><div class="top" style="background:#4FA9BF"></div><div class="meta"><div class="name">Light</div><div class="hex">#4FA9BF</div></div></div>
<div class="sw"><div class="top" style="background:#1F6F84"></div><div class="meta"><div class="name">Dark</div><div class="hex">#1F6F84</div></div></div>
<div class="sw"><div class="top" style="background:rgba(42,143,168,0.12);outline:1px dashed rgba(42,143,168,0.5);outline-offset:-3px"></div><div class="meta"><div class="name">Muted</div><div class="hex">12% alpha</div></div></div>
</div></div>
<div class="group">
<div class="section">Secondary · Pantone 444 C</div>
<div class="row">
<div class="sw"><div class="top" style="background:#7C8084"></div><div class="meta"><div class="name">Secondary</div><div class="hex">#7C8084</div></div></div>
<div class="sw"><div class="top" style="background:#9DA1A4"></div><div class="meta"><div class="name">Light</div><div class="hex">#9DA1A4</div></div></div>
<div class="sw"><div class="top" style="background:#5C6164"></div><div class="meta"><div class="name">Dark</div><div class="hex">#5C6164</div></div></div>
<div class="sw"><div class="top" style="background:rgba(124,128,132,0.12);outline:1px dashed rgba(124,128,132,0.5);outline-offset:-3px"></div><div class="meta"><div class="name">Muted</div><div class="hex">12% alpha</div></div></div>
</div></div>
</body></html>
