<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><title>Shadows</title><style>
body{margin:0;padding:32px;background:var(--surface-base);display:flex;gap:24px;}
.card{flex:1;background:var(--surface-raised);border-radius:12px;padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);min-height:80px;display:flex;flex-direction:column;justify-content:flex-end;}
.name{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;font-family:var(--font-sans);}
</style></head><body>
<div class="card" style="box-shadow:var(--shadow-0);border:1px solid var(--border-subtle)"><div class="name">Shadow 0</div>flat / dividers</div>
<div class="card" style="box-shadow:var(--shadow-1)"><div class="name">Shadow 1</div>cards / list</div>
<div class="card" style="box-shadow:var(--shadow-2)"><div class="name">Shadow 2</div>raised / dropdown</div>
<div class="card" style="box-shadow:var(--shadow-3)"><div class="name">Shadow 3</div>modal / overlay</div>
</body></html>
